<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Challenge</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <h1 class="logo">ABC Challenge</h1>
        <div class="contador">
            <span>Letras descubiertas:</span>
            <span id="contadorLetras">0</span>
        </div>
    </nav>

    <section class="filtros">
        <button onclick="filtrar('vocales')">
            Mostrar Vocales
        </button>

        <button onclick="filtrar('todas')">
            Mostrar Todas
        </button>
    </section>



    <main class="contenedor-cards">


        <!-- Persona 1 (A-E) -->
        <div class="card" data-tipo="vocal" onclick="voltear(this)">
            <div class="card-frente">
                <h1>A</h1>
            </div>
            <div class="card-dorso">
                <img src="https://static.vecteezy.com/system/resources/previews/000/265/209/non_2x/cartoon-slice-of-avocado-vector.jpg"
                    alt="Aguacate">
                <h3>Aguacate</h3>
            </div>
        </div>


        <div class="card" data-tipo="consonante" onclick="voltear(this)">
            <div class="card-frente">
                <h1>B</h1>
            </div>
            <div class="card-dorso">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhDlCzX8-ZO6X2t6bGpFMiUTfOvrywxiCuQtips3B6weNZT_ddEMG_ycU&s=10"
                    alt="Burro">
                <h3>Burro</h3>
            </div>
        </div>

        <div class="card" data-tipo="consonante" onclick="voltear(this)">
            <div class="card-frente">
                <h1>C</h1>
            </div>
            <div class="card-dorso">
                <img src="https://png.pngtree.com/png-vector/20221108/ourmid/pngtree-cartoon-house-illustration-png-image_6434928.png"
                    alt="Casa">
                <h3>Casa</h3>
            </div>
        </div>

        <div class="card" data-tipo="consonante" onclick="voltear(this)">
            <div class="card-frente">
                <h1>D</h1>
            </div>
            <div class="card-dorso">
                <img src="https://img.magnific.com/vector-gratis/dados-dibujos-animados_78370-2910.jpg?semt=ais_hybrid&w=740&q=80"
                    alt="Dado">
                <h3>Dado</h3>
            </div>
        </div>

        <div class="card" data-tipo="vocal" onclick="voltear(this)">
            <div class="card-frente">
                <h1>E</h1>
            </div>
            <div class="card-dorso">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTeP6ZYPVYsxXTWwKrEfWd_6yoo0Yi9GAuQyTAkVETcIoNpDWAGSdfSgOM&s=10"
                    alt="Elefante">
                <h3>Elefante</h3>
            </div>
        </div>

        <!-- Persona 2 (F-J) -->



        <!-- Persona 3 (K-O) -->



        <!-- Persona 4 (P-T) -->



        <!-- Persona 5 (U-Z) -->

    </main>

    <footer class="equipo">
        <h2>Equipo de Rescate</h2>

        <ul>
            <li>Integrante 1</li>
            <li>Integrante 2</li>
            <li>Integrante 3</li>
            <li>Integrante 4</li>
            <li>Integrante 5</li>
        </ul>
    </footer>

    <script src="script.js"></script>

</body>

</html>
